services:
  facilitator:
    build: .
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      GATEWAY_AUTH_MODE: ${GATEWAY_AUTH_MODE:-single_token}
      XRPL_RPC_URL: ${XRPL_RPC_URL:-https://s.altnet.rippletest.net:51234}
      MY_DESTINATION_ADDRESS: ${MY_DESTINATION_ADDRESS:-rPT1Sjq2YGrBMTttX4GZHjKu9dyfzbpAYe}
      FACILITATOR_BEARER_TOKEN: ${FACILITATOR_BEARER_TOKEN:-local-facilitator-token}
      REDIS_URL: redis://redis:6379/0
      NETWORK_ID: ${NETWORK_ID:-xrpl:1}
      SETTLEMENT_MODE: ${SETTLEMENT_MODE:-validated}
      ENABLE_API_DOCS: ${ENABLE_API_DOCS:-false}
    restart: unless-stopped
  merchant:
    build: .
    depends_on:
      facilitator:
        condition: service_started
    ports:
      - "127.0.0.1:8010:8010"
    command: ["uvicorn", "examples.merchant_fastapi.app:app", "--host", "0.0.0.0", "--port", "8010"]
    environment:
      FACILITATOR_URL: http://facilitator:8000
      FACILITATOR_TOKEN: ${FACILITATOR_BEARER_TOKEN:-local-facilitator-token}
      MERCHANT_XRPL_ADDRESS: ${MY_DESTINATION_ADDRESS:-rPT1Sjq2YGrBMTttX4GZHjKu9dyfzbpAYe}
      XRPL_NETWORK: ${NETWORK_ID:-xrpl:1}
      PRICE_DROPS: ${PRICE_DROPS:-1000}
      PRICE_ASSET_CODE: ${PRICE_ASSET_CODE:-XRP}
      PRICE_ASSET_ISSUER: ${PRICE_ASSET_ISSUER:-}
      PRICE_ASSET_AMOUNT: ${PRICE_ASSET_AMOUNT:-}
    restart: unless-stopped
  buyer:
    profiles: ["demo"]
    build: .
    depends_on:
      merchant:
        condition: service_started
    command: ["python", "examples/buyer_httpx.py"]
    environment:
      TARGET_URL: http://merchant:8010/premium
      XRPL_RPC_URL: ${XRPL_RPC_URL:-https://s.altnet.rippletest.net:51234}
      XRPL_NETWORK: ${XRPL_NETWORK:-xrpl:1}
      XRPL_WALLET_SEED: ${XRPL_WALLET_SEED:-}
      PAYMENT_ASSET: ${PAYMENT_ASSET:-XRP:native}
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
