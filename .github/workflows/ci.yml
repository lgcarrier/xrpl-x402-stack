name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r docs/requirements.txt

      - name: Build package artifacts
        run: |
          for package in packages/core packages/facilitator packages/middleware packages/client packages/payer; do
            (
              cd "$package"
              python -m build --sdist
              python -m build --wheel
            )
          done

      - name: Validate package metadata
        run: twine check packages/*/dist/*

      - name: Smoke import stack packages
        run: python -c "import xrpl_x402_core, xrpl_x402_facilitator, xrpl_x402_middleware, xrpl_x402_client, xrpl_x402_payer"

      - name: Smoke install full stack with optional extras
        run: |
          python -m venv /tmp/full-stack-venv
          . /tmp/full-stack-venv/bin/activate
          python -m pip install --upgrade pip
          find_links=()
          for package in packages/core packages/facilitator packages/middleware packages/client packages/payer; do
            find_links+=(--find-links "$PWD/$package/dist")
          done
          python -m pip install "${find_links[@]}" \
            xrpl-x402-core \
            xrpl-x402-facilitator \
            "xrpl-x402-middleware[x402]" \
            "xrpl-x402-client[x402]" \
            "xrpl-x402-payer[mcp]"
          python - <<'PY'
          import xrpl_x402_core
          from xrpl_x402_facilitator import create_app
          from xrpl_x402_middleware.adapters.x402 import register_exact_xrpl_server
          from xrpl_x402_client.adapters.x402 import register_exact_xrpl_client
          from xrpl_x402_payer import XRPLPayer
          import xrpl_x402_payer.mcp as payer_mcp

          assert xrpl_x402_core.XRP_CODE == "XRP"
          assert callable(create_app)
          assert callable(register_exact_xrpl_server)
          assert callable(register_exact_xrpl_client)
          assert XRPLPayer
          assert callable(payer_mcp.main)
          PY
          xrpl-x402-facilitator --help >/dev/null
          xrpl-x402 --help >/dev/null

      - name: Compile source files
        run: PYTHONPYCACHEPREFIX=/tmp/pycache python -m compileall packages tests examples devtools

      - name: Build docs site
        run: mkdocs build --strict

      - name: Run pytest
        run: PYTHONPYCACHEPREFIX=/tmp/pycache pytest -q

      - name: Build Docker image
        run: docker build -t xrpl-x402-facilitator:ci .

      - name: Verify Docker image runs as non-root and excludes local artifacts
        run: |
          docker run --rm xrpl-x402-facilitator:ci \
            python -c "import os, pathlib; assert os.getuid() != 0, 'container runs as root'; forbidden = [path for path in ('/app/.git', '/app/.env', '/app/.live-test-wallets') if pathlib.Path(path).exists()]; assert not forbidden, f'unexpected files in image: {forbidden}'"

  publish-readiness:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - core
          - facilitator
          - middleware
          - client
          - payer

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Resolve package metadata
        run: |
          case "${{ matrix.target }}" in
            core)
              echo "PACKAGE_DIR=packages/core" >> "$GITHUB_ENV"
              echo "PACKAGE_NAME=xrpl-x402-core" >> "$GITHUB_ENV"
              ;;
            facilitator)
              echo "PACKAGE_DIR=packages/facilitator" >> "$GITHUB_ENV"
              echo "PACKAGE_NAME=xrpl-x402-facilitator" >> "$GITHUB_ENV"
              ;;
            middleware)
              echo "PACKAGE_DIR=packages/middleware" >> "$GITHUB_ENV"
              echo "PACKAGE_NAME=xrpl-x402-middleware" >> "$GITHUB_ENV"
              ;;
            client)
              echo "PACKAGE_DIR=packages/client" >> "$GITHUB_ENV"
              echo "PACKAGE_NAME=xrpl-x402-client" >> "$GITHUB_ENV"
              ;;
            payer)
              echo "PACKAGE_DIR=packages/payer" >> "$GITHUB_ENV"
              echo "PACKAGE_NAME=xrpl-x402-payer" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported package target: ${{ matrix.target }}" >&2
              exit 1
              ;;
          esac

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build target artifacts
        run: |
          (
            cd packages/core
            python -m build --sdist
            python -m build --wheel
          )
          if [ "$PACKAGE_DIR" = "packages/payer" ]; then
            (
              cd packages/client
              python -m build --sdist
              python -m build --wheel
            )
          fi
          if [ "$PACKAGE_DIR" != "packages/core" ]; then
            (
              cd "$PACKAGE_DIR"
              python -m build --sdist
              python -m build --wheel
            )
          fi

      - name: Locate built artifacts
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          package_dir = Path(os.environ["PACKAGE_DIR"])
          dist_dir = package_dir / "dist"
          wheel_path = sorted(dist_dir.glob("*.whl"))
          sdist_path = sorted(dist_dir.glob("*.tar.gz"))
          if not wheel_path or not sdist_path:
              raise SystemExit(f"Missing built artifacts in {dist_dir}")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"WHEEL_PATH={wheel_path[0].resolve()}\n")
              handle.write(f"SDIST_PATH={sdist_path[0].resolve()}\n")
              handle.write(f"WHEEL_URI={wheel_path[0].resolve().as_uri()}\n")
          PY

      - name: Validate package metadata
        run: twine check "$WHEEL_PATH" "$SDIST_PATH"

      - name: Smoke install wheel
        run: |
          python -m venv /tmp/wheel-venv
          . /tmp/wheel-venv/bin/activate
          python -m pip install --upgrade pip
          install_args=(install --find-links "$PWD/packages/core/dist")
          if [ "${{ matrix.target }}" = "payer" ]; then
            install_args+=(--find-links "$PWD/packages/client/dist")
          fi
          python -m pip "${install_args[@]}" "$WHEEL_PATH"
          case "${{ matrix.target }}" in
            core)
              python -c "import xrpl_x402_core as package; assert package.XRP_CODE == 'XRP'"
              ;;
            facilitator)
              python -c "from xrpl_x402_facilitator import create_app; assert callable(create_app)"
              xrpl-x402-facilitator --help >/dev/null
              ;;
            middleware)
              python -c "from xrpl_x402_middleware import PaymentMiddlewareASGI; assert PaymentMiddlewareASGI"
              ;;
            client)
              python -c "from xrpl_x402_client import XRPLPaymentSigner; assert XRPLPaymentSigner"
              ;;
            payer)
              python -c "from xrpl_x402_payer import XRPLPayer; assert XRPLPayer"
              xrpl-x402 --help >/dev/null
              ;;
          esac

      - name: Smoke install sdist
        run: |
          python -m venv /tmp/sdist-venv
          . /tmp/sdist-venv/bin/activate
          python -m pip install --upgrade pip
          install_args=(install --find-links "$PWD/packages/core/dist")
          if [ "${{ matrix.target }}" = "payer" ]; then
            install_args+=(--find-links "$PWD/packages/client/dist")
          fi
          python -m pip "${install_args[@]}" "$SDIST_PATH"
          case "${{ matrix.target }}" in
            core)
              python -c "import xrpl_x402_core as package; assert package.XRP_CODE == 'XRP'"
              ;;
            facilitator)
              python -c "from xrpl_x402_facilitator import create_app; assert callable(create_app)"
              xrpl-x402-facilitator --help >/dev/null
              ;;
            middleware)
              python -c "from xrpl_x402_middleware import PaymentMiddlewareASGI; assert PaymentMiddlewareASGI"
              ;;
            client)
              python -c "from xrpl_x402_client import XRPLPaymentSigner; assert XRPLPaymentSigner"
              ;;
            payer)
              python -c "from xrpl_x402_payer import XRPLPayer; assert XRPLPayer"
              xrpl-x402 --help >/dev/null
              ;;
          esac

      - name: Smoke optional extras
        if: matrix.target == 'middleware' || matrix.target == 'client' || matrix.target == 'payer'
        run: |
          python -m venv /tmp/extra-venv
          . /tmp/extra-venv/bin/activate
          python -m pip install --upgrade pip
          extra_name=x402
          install_args=(install --find-links "$PWD/packages/core/dist")
          if [ "${{ matrix.target }}" = "payer" ]; then
            extra_name=mcp
            install_args+=(--find-links "$PWD/packages/client/dist")
          fi
          python -m pip "${install_args[@]}" "${PACKAGE_NAME}[${extra_name}] @ ${WHEEL_URI}"
          case "${{ matrix.target }}" in
            middleware)
              python -c "from xrpl_x402_middleware.adapters.x402 import register_exact_xrpl_server; assert callable(register_exact_xrpl_server)"
              ;;
            client)
              python -c "from xrpl_x402_client.adapters.x402 import register_exact_xrpl_client; assert callable(register_exact_xrpl_client)"
              ;;
            payer)
              python -c "import xrpl_x402_payer.mcp as module; assert callable(module.main)"
              ;;
          esac
