[build-system]
requires = ["editables>=0.5", "hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "xrpl-x402-client"
version = "0.1.0"
description = "Buyer-side Python SDK for XRPL exact x402 payments"
readme = { file = "README.md", content-type = "text/markdown" }
requires-python = ">=3.12"
license = "MIT"
authors = [
  { name = "Louis-Guillaume Carrier-Bedard", email = "lgcarrier@gmail.com" },
]
keywords = ["xrpl", "x402", "client", "httpx", "payments"]
dependencies = [
  "httpx==0.28.1",
  "pydantic>=2,<3",
  "xrpl-py==4.0.0",
  "xrpl-x402-core>=0.1.0,<0.2.0",
]

[project.optional-dependencies]
x402 = ["x402==2.3.0"]

[project.urls]
Homepage = "https://github.com/lgcarrier/xrpl-x402-facilitator"
Documentation = "https://github.com/lgcarrier/xrpl-x402-facilitator"
Repository = "https://github.com/lgcarrier/xrpl-x402-facilitator"
Issues = "https://github.com/lgcarrier/xrpl-x402-facilitator/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/xrpl_x402_client"]

[tool.hatch.build.targets.sdist]
include = [
  "/src/xrpl_x402_client",
  "/README.md",
]
